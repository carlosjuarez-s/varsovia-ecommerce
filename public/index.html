<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varsovia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    nav a {
      color: #999;
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: #fff; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.1rem;
      color: #777;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.2s;
    }

    .cta:hover {
      background: #ddd;
      transform: translateY(-1px);
    }

    .status {
      margin-top: 3rem;
      padding: 0.6rem 1.2rem;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #555;
    }

    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    footer {
      padding: 1.5rem 3rem;
      text-align: center;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Varsovia</div>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Productos</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <main class="hero">
    <h1>Varsovia</h1>
    <p>Ecommerce en desarrollo. Pronto vas a poder explorar nuestro catalogo completo.</p>
    <a href="/api/products" class="cta">Ver Productos (API)</a>
    <div class="status" id="status">
      <span class="dot"></span>
      Verificando servidor...
    </div>
  </main>

  <footer>
    &copy; 2026 Varsovia. Todos los derechos reservados.
  </footer>

  <script>
    fetch('/health')
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').innerHTML =
          `<span class="dot"></span> Servidor activo &mdash; v${data.version}`;
      })
      .catch(() => {
        const el = document.getElementById('status');
        el.innerHTML = '<span class="dot" style="background:#ef4444"></span> Servidor desconectado';
      });
  </script>
</body>
</html>
